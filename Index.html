<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cafeteria Aroma</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <header>
    <h1>Cafeteria Aroma</h1>
    <nav>
      <a href="#sobre">Sobre</a>
      <a href="#produtos">Produtos</a>
      <a href="#contato">Contato</a>
    </nav>
  </header>

  <!-- HERO -->
  <section class="hero">
    <h2>O melhor café da cidade ☕</h2>
    <p>Feito com amor e grãos selecionados</p>
    <button onclick="mostrarMensagem()">Peça agora</button>
  </section>

  <!-- SOBRE -->
  <section id="sobre">
    <h2>Sobre nós</h2>
    <p>Somos uma cafeteria apaixonada por café de qualidade.</p>
  </section>

  <!-- PRODUTOS -->
  <section id="produtos">
    <h2>Produtos</h2>
    <div class="card">Espresso</div>
    <div class="card">Cappuccino</div>
    <div class="card">Latte</div>
  </section>

  <!-- CONTATO -->
  <section id="contato">
    <h2>Contato</h2>
    <p>Email: contato@cafeteria.com</p>
  </section>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 Cafeteria Aroma</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
